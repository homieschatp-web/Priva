<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Pro - Full Screen</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #fdfdfd;
            --panel: #ffffff;
            --primary: #0084ff;
            --sent: #e7f3ff;
            --recv: #f0f0f0;
            --text: #1c1e21;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }

        /* Full Screen Container */
        #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; max-width: 600px; margin: 0 auto; background: var(--panel); border-left: 1px solid #eee; border-right: 1px solid #eee; }

        /* Login Screen Overlay */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--panel); z-index: 100; display: flex; justify-content: center; align-items: center; flex-direction: column; padding: 20px; }
        .login-card { width: 100%; max-width: 320px; text-align: center; }
        .login-input { width: 100%; padding: 15px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; outline: none; }
        .login-btn { width: 100%; padding: 15px; border: none; background: var(--primary); color: white; border-radius: 12px; font-weight: 600; cursor: pointer; }

        /* Header */
        header { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); }

        /* Chat Area */
        #messages { flex: 1; overflow-y: scroll; padding: 20px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 85%; position: relative; word-wrap: break-word; font-size: 15px; line-height: 1.4; animation: pop 0.2s ease-out; }
        .sent { align-self: flex-end; background: var(--sent); color: var(--text); border-bottom-right-radius: 4px; }
        .recv { align-self: flex-start; background: var(--recv); color: var(--text); border-bottom-left-radius: 4px; }
        .pinned { border: 2px solid #ffd700 !important; order: -1; margin-bottom: 20px; }

        .msg img { max-width: 100%; border-radius: 12px; margin: 5px 0; display: block; }
        .time { font-size: 10px; opacity: 0.6; margin-top: 5px; display: block; }

        /* Actions - Hidden until hover */
        .msg-tools { display: flex; gap: 10px; margin-top: 8px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 5px; opacity: 0; }
        .msg:hover .msg-tools { opacity: 1; }
        .tool-icon { cursor: pointer; stroke-width: 2; fill: none; transition: 0.2s; }
        .tool-icon:hover { transform: scale(1.2); }

        /* Input Area (Good Input) */
        .input-bar { padding: 15px 20px; background: white; border-top: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .input-container { flex: 1; background: #f0f2f5; border-radius: 24px; padding: 8px 15px; display: flex; align-items: center; }
        #msgInput { flex: 1; border: none; background: transparent; padding: 8px; outline: none; font-size: 15px; }
        
        .hidden { display: none !important; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#0084ff" stroke-width="1.5"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-11.7 8.38 8.38 0 0 1 3.8.9L21 3z"></path></svg>
        <h2 style="font-weight: 500;">Messenger</h2>
        <input type="text" id="user" class="login-input" placeholder="Name">
        <input type="password" id="pass" class="login-input" placeholder="Password">
        <button onclick="login()" class="login-btn">Login</button>
    </div>
</div>

<div id="app">
    <header>
        <strong id="display-user">Chat</strong>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0084ff" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
    </header>

    <div id="messages"></div>

    <div class="input-bar">
        <label style="cursor: pointer; display: flex;">
            <svg class="tool-icon" width="26" height="26" viewBox="0 0 24 24" stroke="#0084ff"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            <input type="file" id="fileIn" hidden onchange="uploadImage(this)">
        </label>
        
        <div class="input-container">
            <input type="text" id="msgInput" placeholder="Aa" onkeypress="if(event.key==='Enter') sendText()">
        </div>

        <div onclick="sendText()" style="cursor: pointer; display: flex;">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#0084ff" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCoVj4nvQJULBMD_KYpGfRWi4npme6RNnM",
        authDomain: "mms-f37cf.firebaseapp.com",
        projectId: "mms-f37cf",
        storageBucket: "mms-f37cf.firebasestorage.app",
        messagingSenderId: "85615411698",
        appId: "1:85615411698:web:ab25f02dac6efa1e6eeb6b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentUser = "";

    function login() {
        const u = document.getElementById('user').value.toLowerCase();
        const p = document.getElementById('pass').value;
        if((u === 'fahad' || u === 'aariz') && p === '123') {
            currentUser = u;
            document.getElementById('display-user').innerText = u.toUpperCase();
            document.getElementById('login-overlay').classList.add('hidden');
            initChat();
        } else { alert("Invalid login"); }
    }

    function initChat() {
        db.collection("messages").orderBy("time", "asc").onSnapshot(snap => {
            const box = document.getElementById('messages');
            box.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.user === currentUser;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'sent' : 'recv'} ${d.pinned ? 'pinned' : ''}`;
                
                const content = d.type === 'img' ? `<img src="${d.url}">` : `<span>${d.text}</span>`;
                
                div.innerHTML = `
                    ${content}
                    <span class="time">${new Date(d.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    <div class="msg-tools">
                        <svg class="tool-icon" onclick="togglePin('${doc.id}', ${d.pinned})" width="14" height="14" viewBox="0 0 24 24" stroke="orange"><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14"></path></svg>
                        <svg class="tool-icon" onclick="deleteMsg('${doc.id}')" width="14" height="14" viewBox="0 0 24 24" stroke="red"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </div>
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function sendText() {
        const input = document.getElementById('msgInput');
        if(!input.value) return;
        await db.collection("messages").add({
            user: currentUser, text: input.value, type: 'text', time: Date.now(), pinned: false
        });
        input.value = '';
    }

    async function uploadImage(input) {
        if(!input.files[0]) return;
        const form = new FormData();
        form.append("image", input.files[0]);
        
        // ImgBB API
        const res = await fetch("https://api.imgbb.com/1/upload?key=fd6e03b820736b37d2290112443c82e8", {
            method: "POST",
            body: form
        });
        const json = await res.json();
        if(json.success) {
            await db.collection("messages").add({
                user: currentUser, url: json.data.url, type: 'img', time: Date.now(), pinned: false
            });
        }
    }

    function deleteMsg(id) { db.collection("messages").doc(id).delete(); }
    function togglePin(id, s) { db.collection("messages").doc(id).update({ pinned: !s }); }
</script>
</body>
</html>
