<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Chat - SVG Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #fdfdfd;
            --panel: #ffffff;
            --primary: #007aff;
            --me: #e1f5fe;
            --them: #f5f5f5;
            --accent: #ffc107;
            --danger: #ff5252;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: -apple-system, sans-serif; background: var(--bg); }

        /* Full Screen Flex Layout */
        #app { display: flex; flex-direction: column; height: 100dvh; width: 100%; max-width: 600px; margin: 0 auto; background: var(--panel); position: relative; }

        /* Auth Screen */
        #auth-overlay { position: absolute; inset: 0; background: white; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; transition: opacity 0.4s ease; }
        .auth-input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #eee; border-radius: 12px; font-size: 16px; outline: none; background: #fafafa; }
        .auth-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }

        /* Header */
        header { padding: 15px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; min-height: 60px; }
        .user-badge { font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; }

        /* Chat Scroller */
        #chat-scroller { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #fcfcfc; scroll-behavior: smooth; }
        
        .message { padding: 12px 16px; border-radius: 20px; max-width: 85%; position: relative; animation: slideIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .me { align-self: flex-end; background: var(--me); border-bottom-right-radius: 4px; border: 1px solid #d1e9f6; }
        .them { align-self: flex-start; background: var(--them); border-bottom-left-radius: 4px; border: 1px solid #eee; }
        .pinned { border: 2px solid var(--accent) !important; order: -1; margin-bottom: 10px; }

        /* Image Handling */
        .msg-img { width: 100%; border-radius: 12px; margin: 8px 0; display: block; cursor: zoom-in; transition: transform 0.2s; background: #eee; min-height: 100px; object-fit: cover; }
        .msg-img:active { transform: scale(0.98); }

        .ts { font-size: 10px; color: #999; display: block; margin-top: 5px; text-align: right; }

        /* Tools Icon Bar */
        .tools { display: flex; gap: 15px; margin-top: 8px; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 8px; }
        .svg-btn { cursor: pointer; fill: none; stroke: #aaa; stroke-width: 2; transition: 0.2s; }
        .svg-btn:hover { stroke: var(--primary); }
        .btn-del:hover { stroke: var(--danger); }

        /* Bottom Input Bar */
        footer { padding: 12px 15px; border-top: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; background: white; }
        .input-pill { flex: 1; background: #f3f4f6; border-radius: 24px; padding: 4px 16px; display: flex; align-items: center; }
        #text-in { width: 100%; border: none; background: transparent; padding: 10px 0; outline: none; font-size: 16px; }

        .hidden { display: none !important; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app">
    <div id="auth-overlay">
        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        <h2 style="margin: 20px 0;">Sign In</h2>
        <input type="text" id="user-in" class="auth-input" placeholder="Fahad or Aariz">
        <input type="password" id="pass-in" class="auth-input" placeholder="Password">
        <button onclick="handleLogin()" class="auth-btn">Continue</button>
    </div>

    <header>
        <span id="user-display" class="user-badge">Chat</span>
        <div id="up-loader" style="display:none;">
            <svg width="20" height="20" viewBox="0 0 24 24" stroke="var(--primary)" stroke-width="3" fill="none"><circle cx="12" cy="12" r="10" stroke-opacity="0.2"/><path d="M12 2a10 10 0 0 1 10 10"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1s" repeatCount="indefinite"/></path></svg>
        </div>
    </header>

    <div id="chat-scroller"></div>

    <footer>
        <label>
            <svg class="svg-btn" width="28" height="28" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <input type="file" accept="image/*" capture="environment" hidden onchange="processUpload(this)">
        </label>
        <label>
            <svg class="svg-btn" width="28" height="28" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
            <input type="file" accept="image/*" hidden onchange="processUpload(this)">
        </label>
        <div class="input-pill">
            <input type="text" id="text-in" placeholder="Message..." onkeypress="if(event.key==='Enter') pushText()">
        </div>
        <div onclick="pushText()">
            <svg class="svg-btn" width="28" height="28" viewBox="0 0 24 24" stroke="var(--primary)"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </div>
    </footer>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCoVj4nvQJULBMD_KYpGfRWi4npme6RNnM",
        authDomain: "mms-f37cf.firebaseapp.com",
        projectId: "mms-f37cf",
        storageBucket: "mms-f37cf.firebasestorage.app",
        appId: "1:85615411698:web:ab25f02dac6efa1e6eeb6b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let currentMe = "";

    function handleLogin() {
        const u = document.getElementById('user-in').value.toLowerCase().trim();
        const p = document.getElementById('pass-in').value;
        if ((u === 'fahad' || u === 'aariz') && p === '123') {
            currentMe = u;
            document.getElementById('user-display').innerText = u;
            document.getElementById('auth-overlay').classList.add('hidden');
            startLiveStream();
        } else { alert("Invalid Credentials"); }
    }

    function startLiveStream() {
        db.collection("mms_chat").orderBy("time", "asc").onSnapshot(snap => {
            const scroller = document.getElementById('chat-scroller');
            scroller.innerHTML = '';
            snap.forEach(doc => {
                const d = doc.data();
                const isMe = d.sender === currentMe;
                const div = document.createElement('div');
                div.className = `message ${isMe ? 'me' : 'them'} ${d.pinned ? 'pinned' : ''}`;
                
                // Securely render image or text
                let body = d.type === 'img' 
                    ? `<img src="${d.url}" class="msg-img" loading="lazy" onclick="window.open(this.src)">` 
                    : `<div style="word-break:break-word;">${d.msg}</div>`;

                div.innerHTML = `
                    ${body}
                    <span class="ts">${new Date(d.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    <div class="tools">
                        <svg class="svg-btn" onclick="doPin('${doc.id}', ${d.pinned})" width="16" height="16" viewBox="0 0 24 24" stroke="${d.pinned ? 'var(--accent)' : '#aaa'}"><path d="M21 10V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l2-1.14"></path></svg>
                        <svg class="svg-btn btn-del" onclick="doDelete('${doc.id}')" width="16" height="16" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </div>
                `;
                scroller.appendChild(div);
            });
            scroller.scrollTop = scroller.scrollHeight;
        });
    }

    async function pushText() {
        const input = document.getElementById('text-in');
        if (!input.value.trim()) return;
        await db.collection("mms_chat").add({
            sender: currentMe, msg: input.value, type: 'text', time: Date.now(), pinned: false
        });
        input.value = '';
    }

    async function processUpload(el) {
        if (!el.files[0]) return;
        document.getElementById('up-loader').style.display = 'block';
        
        const form = new FormData();
        form.append("image", el.files[0]);

        try {
            const res = await fetch("https://api.imgbb.com/1/upload?key=fd6e03b820736b37d2290112443c82e8", {
                method: "POST", body: form
            });
            const data = await res.json();
            if (data.success) {
                await db.collection("mms_chat").add({
                    sender: currentMe, url: data.data.url, type: 'img', time: Date.now(), pinned: false
                });
            }
        } catch (e) { alert("Network Error"); }
        finally {
            document.getElementById('up-loader').style.display = 'none';
            el.value = "";
        }
    }

    function doDelete(id) { db.collection("mms_chat").doc(id).delete(); }
    function doPin(id, s) { db.collection("mms_chat").doc(id).update({ pinned: !s }); }
</script>
</body>
</html>
